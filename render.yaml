services:
  - type: web
    name: readex-api
    env: python
    plan: free
    region: ohio
    buildCommand: |
      pip install -r backend/requirements.txt
      cd backend && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: cd backend && gunicorn backend.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        fromDatabase:
          name: readex
          property: host
      - key: CORS_ALLOWED_ORIGINS
        scope: build_and_runtime
      - key: CSRF_TRUSTED_ORIGINS
        scope: build_and_runtime

  - type: pserv
    name: readex-db
    ipWhitelist: []
    plan: free
    postgresVersion: "15"
